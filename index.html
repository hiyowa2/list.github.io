<html>

<head>

</head>
  <body>
<div class="white">
  <div class="a">
 
    <p>立ち絵:</p>
    <p>
<div class="roko">
  <div class="viewpoint">
  <button onclick="prev()">◀</button>
  <img id="char" src="霊夢(無料版).webp">
  <button onclick="next()">▶</button>
</div>

</div>
    </p>

      ロコ式:
<span class="maroon"><a href="https://roko-sroom.fanbox.cc/posts?page=3&sort=newest"target="blank">リンク</a>
</span>
</div>
</div>
</div>





<script>
const poses = [
  "霊夢(無料版).webp",
  "霊夢(無料版)_0000.webp",
  "霊夢(無料版)_0001.webp",
  "霊夢(無料版)_0002.webp",
  "霊夢(無料版)_0003.webp",
  "霊夢(無料版)_0004.webp",
];

let index = 0;

function show(){
  document.getElementById("char").src = poses[index];
}

function next(){
  index = (index + 1) % poses.length;
  show();
}

function prev(){
  index = (index - 1 + poses.length) % poses.length;
  show();
}
</script>




</body>
