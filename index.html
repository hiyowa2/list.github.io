<html>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<head>
<link rel="stylesheet" href="style.css">
<meta charset="UTF-8">
<title>ヒヨワニ動画内素材リスト</title>
</head>

<body>

<div class="white">
<div class="a">

<p>立ち絵:</p>
<p class="min">
(立ち絵はスワイプで他プレビューも閲覧可能です)
</p>

<div class="viewer">

<div class="roko1">
<img id="char1" src="霊夢(無料版).webp">
</div>

<div class="roko2">
<img id="char2" src="魔理沙(無料版).webp">
</div>

<div class="roko3">
<img id="char3" src="妖夢(無料版).png">
</div>

</div>

ロコ式:
<span class="maroon">
<a href="https://roko-sroom.fanbox.cc/posts?page=3&sort=newest" target="blank">リンク</a>
</span>

</div>
</div>
<script>

/* 共通関数 */

function setupViewer(imgId, poses){

let index = 0;
const img = document.getElementById(imgId);

function show(){
img.src = poses[index];
}

function next(){
index = (index + 1) % poses.length;
show();
}

function prev(){
index = (index - 1 + poses.length) % poses.length;
show();
}

function tap(x){
const rect = img.getBoundingClientRect();
const half = rect.width / 2;

if(x < half){
prev();
}else{
next();
}
}

img.addEventListener("click",(e)=>{
tap(e.clientX - img.getBoundingClientRect().left);
});

}


/* 霊夢 */

setupViewer("char1",[
"霊夢(無料版).webp",
"霊夢(無料版)_0000.webp",
"霊夢(無料版)_0001.webp",
"霊夢(無料版)_0002.webp",
"霊夢(無料版)_0003.webp",
"霊夢(無料版)_0004.webp",
]);


/* 魔理沙 */

setupViewer("char2",[
"魔理沙(無料版).webp",
"魔理沙(無料版)_0001.webp",
"魔理沙(無料版)_0002.webp",
"魔理沙(無料版)_0003.webp",
"魔理沙(無料版)_0004.webp",
"魔理沙(無料版)_0005.webp",
]);


/* 妖夢 */

setupViewer("char3",[
"妖夢(無料版).png",
"妖夢(無料版)_0000.png",
"妖夢(無料版)_0001.png",
"妖夢(無料版)_0002.png",
"妖夢(無料版)_0003.png",
"妖夢(無料版)_0004.png",
"妖夢(無料版)_0005.png",
]);

</script>
</body>
